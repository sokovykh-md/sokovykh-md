jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Generate GitHub Stats
        run: |
          curl -o stats.svg "https://github-readme-stats.vercel.app/api?username=ssokov&show_icons=true&theme=tokyonight&count_private=true&access_token=${{ secrets.GH_STATS_TOKEN }}"

      - name: Commit and push stats
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add stats.svg
          git commit -m "Update GitHub stats" || echo "No changes to commit"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:${{ github.ref }}
